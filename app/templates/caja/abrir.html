{% extends "base.html" %}
{% block title %}Abrir Caja{% endblock %}
{% block content %}
<h3 class="mb-4"><i class="bi bi-unlock me-2"></i>Abrir Caja</h3>

<div class="card shadow-sm" style="max-width:500px">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Monto inicial *</label>
                <div class="input-group">
                    <span class="input-group-text">Gs.</span>
                    <input type="number" name="monto_inicial" class="form-control form-control-lg" required step="1" value="0">
                </div>
            </div>
            <button type="submit" class="btn btn-success w-100"><i class="bi bi-check-circle me-2"></i>Abrir Caja</button>
        </form>
    </div>
</div>
{% endblock %}
