{% extends "base.html" %}
{% block title %}{{ 'Editar' if editando else 'Agregar' }} Cliente{% endblock %}
{% block content %}
<h3 class="mb-4"><i class="bi bi-{{ 'pencil' if editando else 'person-plus' }} me-2"></i>{{ 'Editar' if editando else 'Agregar' }} Cliente</h3>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Nombre *</label>
                    <input type="text" name="nombre" class="form-control" required value="{{ cliente.nombre if editando else request.args.get('nombre', '') }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Apellido</label>
                    <input type="text" name="apellido" class="form-control" value="{{ cliente.apellido if editando else '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Fecha de Nacimiento</label>
                    <input type="date" name="fecha_nac" class="form-control" value="{{ cliente.fecha_nac.strftime('%Y-%m-%d') if editando and cliente.fecha_nac else '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">CI</label>
                    <input type="text" name="ci" class="form-control" value="{{ cliente.ci if editando else '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">RUC</label>
                    <input type="text" name="ruc" class="form-control" value="{{ cliente.ruc if editando else '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-control" value="{{ cliente.telefono if editando else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Correo</label>
                    <input type="email" name="correo" class="form-control" value="{{ cliente.correo if editando else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Dirección</label>
                    <input type="text" name="direccion" class="form-control" value="{{ cliente.direccion if editando else '' }}">
                </div>
                <div class="col-md-12">
                    <label class="form-label">Observaciones</label>
                    <textarea name="observaciones" class="form-control" rows="2">{{ cliente.observaciones if editando else '' }}</textarea>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary"><i class="bi bi-save me-2"></i>Guardar</button>
                <a href="{{ url_for('ventas.clientes') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
