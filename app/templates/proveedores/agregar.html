{% extends "base.html" %}
{% block title %}{{ 'Editar' if editando else 'Agregar' }} Proveedor{% endblock %}
{% block content %}
<h3 class="mb-4"><i class="bi bi-{{ 'pencil' if editando else 'plus-lg' }} me-2"></i>{{ 'Editar' if editando else 'Agregar' }} Proveedor</h3>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre *</label>
                    <input type="text" name="nombre" class="form-control" required value="{{ proveedor.nombre if editando else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Empresa</label>
                    <input type="text" name="empresa" class="form-control" value="{{ proveedor.empresa if editando else '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">RUC</label>
                    <input type="text" name="ruc" class="form-control" value="{{ proveedor.ruc if editando else '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-control" value="{{ proveedor.telefono if editando else '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Correo</label>
                    <input type="email" name="correo" class="form-control" value="{{ proveedor.correo if editando else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Dirección</label>
                    <input type="text" name="direccion" class="form-control" value="{{ proveedor.direccion if editando else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Ciudad</label>
                    <input type="text" name="ciudad" class="form-control" value="{{ proveedor.ciudad if editando else '' }}">
                </div>
                <div class="col-md-12">
                    <label class="form-label">Observaciones</label>
                    <textarea name="observaciones" class="form-control" rows="2">{{ proveedor.observaciones if editando else '' }}</textarea>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary"><i class="bi bi-save me-2"></i>Guardar</button>
                <a href="{{ url_for('proveedores.listar') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
