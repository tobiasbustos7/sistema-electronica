{% extends "base.html" %}
{% block title %}{{ 'Editar' if editando else 'Crear' }} Usuario{% endblock %}
{% block content %}
<h3 class="mb-4"><i class="bi bi-{{ 'pencil' if editando else 'person-plus' }} me-2"></i>{{ 'Editar' if editando else 'Crear' }} Usuario</h3>

<div class="card shadow-sm" style="max-width:600px">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Usuario *</label>
                    <input type="text" name="username" class="form-control" required value="{{ usuario.username if editando else '' }}" {{ 'readonly' if editando }}>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nombre *</label>
                    <input type="text" name="nombre" class="form-control" required value="{{ usuario.nombre if editando else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ usuario.email if editando else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Rol</label>
                    <select name="rol_id" class="form-select" required>
                        {% for r in roles %}
                        <option value="{{ r.id }}" {% if editando and usuario.rol_id == r.id %}selected{% endif %}>{{ r.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">{{ 'Nueva ' if editando else '' }}Contraseña {{ '' if editando else '*' }}</label>
                    <input type="password" name="password" class="form-control" {{ '' if editando else 'required' }}>
                </div>
                {% if editando %}
                <div class="col-md-6">
                    <div class="form-check mt-4">
                        <input type="checkbox" name="activo" class="form-check-input" id="activo" {{ 'checked' if usuario.activo }}>
                        <label class="form-check-label" for="activo">Usuario activo</label>
                    </div>
                </div>
                {% endif %}
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary"><i class="bi bi-save me-2"></i>Guardar</button>
                <a href="{{ url_for('usuarios.listar') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
